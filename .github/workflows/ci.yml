name: 'CI - vers'
run-name: 'vers - "${{ github.ref_name }}"'
permissions:
  contents: read
on:
  push:
    branches:
      - "main"

  pull_request:
    branches:
      - "**"

  workflow_dispatch:

jobs:
  build:
    name: ''
    if: github.actor != 'dependabot[bot]'
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:

          - os: ubuntu-24.04
            shell: bash
            deps: sudo apt-get install libvulkan-dev

          ##  - os: macos-15
          ##    shell: bash
          ##    deps: ./scripts/unix/macos/install-vulkansdk.sh

          - os: windows-2025
            shell: powershell
            deps:  .\scripts\windows\install-vulkansdk.ps1

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v6.0.1
        with:
          ref: ${{ github.ref }}
          repository: '${{ github.repository }}'
          fetch-depth: 1
          submodules: recursive

      - name: 'Cache cargo'
        uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: build-${{ matrix.os }}-${{ hashFiles('**/Cargo.toml') }}

      - name: 'Install VulkanSDK'
        run: ${{ matrix.deps }}

      - name: 'Build'
        run: cargo check

      - name: 'Run tests'
        run: cargo test
