version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "Europe/Paris"
    rebase-strategy: auto
    open-pull-requests-limit: 10
    commit-message:
      prefix: "github-actions"

  - package-ecosystem: "cargo"
    directories:
      - "/"
      - "/crates/*"
      - "/examples/*"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "Europe/Paris"
    rebase-strategy: auto
    open-pull-requests-limit: 10
    commit-message:
      prefix: "cargo"
      include: scope
    groups:
      cargo:
        patterns:
          - "*"
